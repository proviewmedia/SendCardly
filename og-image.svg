<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="33%" style="stop-color:#E8366D"/>
      <stop offset="66%" style="stop-color:#6C4FE0"/>
      <stop offset="100%" style="stop-color:#0EA5A5"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb"/>
      <stop offset="100%" style="stop-color:#f5576c"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea"/>
      <stop offset="100%" style="stop-color:#fed6e3"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#f7f6f3"/>
  <!-- Card illustration - back card -->
  <rect x="640" y="155" width="220" height="293" rx="16" ry="16" fill="url(#cardGrad2)" opacity="0.85" transform="rotate(6, 750, 300)"/>
  <!-- Card illustration - front card -->
  <rect x="600" y="140" width="220" height="293" rx="16" ry="16" fill="url(#cardGrad1)" transform="rotate(-4, 710, 285)"/>
  <!-- Emoji on front card -->
  <text x="700" y="300" font-size="60" text-anchor="middle" transform="rotate(-4, 710, 285)">🎂</text>
  <!-- Brand name -->
  <text x="360" y="260" font-family="sans-serif" font-size="80" font-weight="800" fill="url(#brandGrad)" letter-spacing="-3">Sendr</text>
  <!-- Tagline -->
  <text x="360" y="310" font-family="sans-serif" font-size="26" fill="#666360" letter-spacing="0.5">Say it with a card</text>
  <!-- Bottom text -->
  <text x="360" y="440" font-family="sans-serif" font-size="20" fill="#9e9a95" font-weight="600" letter-spacing="1.5">Free. Instant. Personal.</text>
</svg>
