const getBgStyle = (bg) => {
  if (bg.type==="solid") return {backgroundColor:bg.value};
  if (bg.type==="texture"){const s={backgroundImage:bg.value,backgroundColor:bg.bgColor||"#fff"};if(bg.bgSize)s.backgroundSize=bg.bgSize;return s;}
  return {backgroundImage:bg.value};
};
const isBgLight = (bg) => {
  const hex=(bg.type==="solid"?bg.value:bg.bgColor||"").replace("#","");
  if(!/^[0-9a-fA-F]{6}$/.test(hex))return false;
  const r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
  return(0.299*r+0.587*g+0.114*b)/255>0.55;
};

function DraggableEmoji({sticker,cardRef,onMove,onRemove,editable}){
  const [dragging,setDragging]=useState(false);
  const [showDel,setShowDel]=useState(false);
  const off=useRef({x:0,y:0});
  const start=useCallback((cx,cy)=>{if(!editable)return;const r=cardRef.current&&cardRef.current.getBoundingClientRect();if(!r)return;off.current={x:cx-r.left-(sticker.x/100)*r.width,y:cy-r.top-(sticker.y/100)*r.height};setDragging(true);},[editable,sticker.x,sticker.y,cardRef]);
  const move=useCallback((cx,cy)=>{if(!dragging)return;const r=cardRef.current&&cardRef.current.getBoundingClientRect();if(!r)return;onMove(sticker.id,Math.max(0,Math.min(92,((cx-r.left-off.current.x)/r.width)*100)),Math.max(0,Math.min(92,((cy-r.top-off.current.y)/r.height)*100)));},[dragging,cardRef,onMove,sticker.id]);
  const end=useCallback(()=>setDragging(false),[]);
  useEffect(()=>{if(!dragging)return;const mm=e=>move(e.clientX,e.clientY);const tm=e=>{e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY)};const u=()=>end();window.addEventListener("mousemove",mm);window.addEventListener("mouseup",u);window.addEventListener("touchmove",tm,{passive:false});window.addEventListener("touchend",u);return()=>{window.removeEventListener("mousemove",mm);window.removeEventListener("mouseup",u);window.removeEventListener("touchmove",tm);window.removeEventListener("touchend",u)};},[dragging,move,end]);
  return html`<div onMouseDown=${e=>{e.preventDefault();start(e.clientX,e.clientY)}} onTouchStart=${e=>start(e.touches[0].clientX,e.touches[0].clientY)} onClick=${e=>{if(editable&&!dragging){e.stopPropagation();setShowDel(!showDel)}}} style=${{position:"absolute",left:sticker.x+"%",top:sticker.y+"%",transform:"rotate("+sticker.rotation+"deg) scale("+sticker.scale+")",fontSize:sticker.size||28,cursor:editable?(dragging?"grabbing":"grab"):"default",userSelect:"none",zIndex:dragging?100:10,filter:"drop-shadow(0 2px 4px rgba(0,0,0,0.12))",transition:dragging?"none":"transform 0.15s",touchAction:"none"}}>${sticker.emoji}${showDel&&editable&&html`<button onClick=${e=>{e.stopPropagation();onRemove(sticker.id)}} style=${{position:"absolute",top:-10,right:-10,width:20,height:20,borderRadius:"50%",background:"#dc2626",border:"2px solid #fff",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0,boxShadow:"0 2px 6px rgba(0,0,0,0.15)"}}>×</button>`}</div>`;
}

      </div>

    </div>`;
  };

  // ═══ OCCASION ═══
  if(screen==="occasion"){
    return html`<div style=${{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"48px 20px",fontFamily:"'Outfit',sans-serif"}}>
      <div style=${{textAlign:"center",marginBottom:48,animation:"fadeUp 0.6s ease-out"}}>
        <h1 style=${{fontSize:54,fontWeight:800,color:"transparent",margin:"0 0 8px",letterSpacing:-2,lineHeight:1,backgroundImage:"linear-gradient(135deg, #FF6B35, #E8366D, #6C4FE0, #0EA5A5, #D4960A, #FF6B35)",backgroundSize:"300% auto",backgroundClip:"text",WebkitBackgroundClip:"text",animation:"shimmer 5s linear infinite"}}>SendCardly</h1>
        <p style=${{color:T.text3,fontSize:14,letterSpacing:5,textTransform:"uppercase",fontWeight:400}}>say it with a card</p>
      </div>

            ${tab==="background"&&html`<div style=${{animation:"fadeIn 0.2s"}}>

                  </button>`})}

            ${tab==="layout"&&html`<div style=${{animation:"fadeIn 0.2s"}}>

            ${tab==="typography"&&html`<div style=${{animation:"fadeIn 0.2s"}}>

            </div>`}

            ${tab==="emoji"&&html`<div style=${{animation:"fadeIn 0.2s"}}>

              <div style=${{display:"flex",gap:5,marginBottom:14,flexWrap:"wrap"}}>${EMOJI_CATEGORIES.map((c,i)=>html`<button key=${i} onClick=${()=>setEmojiCat(i)} style=${pill(emojiCat===i)}>${c.label}</button>`)}</div>
              <div style=${{display:"grid",gridTemplateColumns:"repeat(6, 1fr)",gap:5}}>
                ${EMOJI_CATEGORIES[emojiCat].emojis.map((em,i)=>html`<button key=${i} onClick=${()=>addSticker(em)} style=${{width:"100%",aspectRatio:"1",fontSize:22,background:"#fff",border:"1.5px solid "+T.borderLight,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.12s"}} onMouseEnter=${ev=>{ev.currentTarget.style.transform="scale(1.1)"}} onMouseLeave=${ev=>{ev.currentTarget.style.transform=""}}>${em}</button>`)}

            ${tab==="photo"&&html`<div style=${{animation:"fadeIn 0.2s"}}>

              <input ref=${fileRef} type="file" accept="image/*" onChange=${e=>{const f=e.target.files&&e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>setPhotoUrl(ev.target.result);r.readAsDataURL(f)}}} style=${{display:"none"}}/>
              <button onClick=${()=>{if(fileRef.current)fileRef.current.click()}} style=${{width:"100%",background:photoUrl?"rgba(26,26,26,0.03)":T.input,border:photoUrl?"2px solid rgba(26,26,26,0.15)":"2px dashed "+T.border,borderRadius:12,padding:"24px 16px",cursor:"pointer",color:photoUrl?T.text:T.text3,fontSize:13,fontFamily:"'Outfit',sans-serif",fontWeight:600}}>${photoUrl?"✓ Photo added (tap to change)":"📷  Choose a photo"}</button>
              ${photoUrl&&html`<div style=${{marginTop:14,borderRadius:10,overflow:"hidden",border:"1px solid "+T.border}}><img src=${photoUrl} alt="Preview" style=${{width:"100%",height:140,objectFit:"cover",display:"block"}}/></div><button onClick=${()=>{setPhotoUrl(null);if(fileRef.current)fileRef.current.value=""}} style=${{background:"none",border:"none",color:"#dc2626",fontSize:11,cursor:"pointer",marginTop:8,fontFamily:"'Outfit',sans-serif",fontWeight:600}}>Remove</button>`}
            </div>`}
          </div>
        </div>
      </div>

  // ═══ PREVIEW ═══

      <div style=${{animation:"fadeUp 0.5s ease-out",textAlign:"center",marginBottom:24}}><h2 style=${{color:T.text,fontSize:24,fontWeight:700,margin:"0 0 4px"}}>Looking good ✨</h2><p style=${{color:T.text3,fontSize:14}}>Here is how your card will look</p></div>

  // ═══ REVEAL ═══
  if(showReveal||screen==="reveal"){
    return html`<div style=${{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"40px 20px",fontFamily:"'Outfit',sans-serif"}}>
      ${!envelopeOpen&&html`<div style=${{textAlign:"center",animation:"fadeUp 0.6s ease-out"}}>

        <button onClick=${()=>{setShowReveal(false);setEnvelopeOpen(false);setCardRevealed(false)}} style=${{background:"#fff",border:"1px solid "+T.border,color:T.text,fontSize:13,padding:"9px 20px",borderRadius:20,cursor:"pointer",fontFamily:"'Outfit',sans-serif",fontWeight:600,animation:"fadeUp 0.5s ease-out 0.4s both"}}>← Back</button>

  if(screen==="send"){

          <span style=${{color:T.text4,fontSize:14}}>→</span>
        </button>`)}
        ${hasNativeShare&&html`<button onClick=${handleNativeShare} style=${{background:T.accent,border:"none",borderRadius:12,padding:"14px 18px",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}><span style=${{fontSize:18,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.15)",borderRadius:10,flexShrink:0,color:"#fff"}}>⬡</span><div style=${{textAlign:"left",flex:1}}><p style=${{color:"#fff",fontSize:14,fontWeight:600,margin:0}}>Share</p><p style=${{color:"rgba(255,255,255,0.6)",fontSize:11,margin:"2px 0 0"}}>Use your device share menu</p></div><span style=${{color:"rgba(255,255,255,0.5)",fontSize:14}}>→</span></button>`}
        <div style=${{background:T.input,border:"1px dashed "+T.border,borderRadius:12,padding:"12px 18px",display:"flex",alignItems:"center",gap:14,opacity:0.4}}><span style=${{fontSize:14,color:T.text3}}>▣</span><p style=${{color:T.text3,fontSize:11}}>QR Code coming soon</p></div>
      </div>
      <button onClick=${()=>setScreen("preview")} style=${{background:"none",border:"none",color:T.text3,fontSize:13,cursor:"pointer",marginTop:24,fontFamily:"'Outfit',sans-serif"}}>← Back to Preview</button>
    </div>`;
  }

  return null;
}

render(html`<${App}/>`, document.getElementById("root"));
</script>
</body>
</html>
