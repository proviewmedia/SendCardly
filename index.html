// ── HELPERS ──

function encodeCard(data) {
  try { return btoa(unescape(encodeURIComponent(JSON.stringify(data)))); }
  catch (e) { return ""; }
}

function decodeCard(str) {
  try { return JSON.parse(decodeURIComponent(escape(atob(str)))); }
  catch (e) { return null; }
}

function getSharedCard() {
  try {
    var params = new URLSearchParams(window.location.search);
    var cardParam = params.get("card");
    return cardParam ? decodeCard(cardParam) : null;
  } catch (e) { return null; }
}

function getBgStyle(bg) {
  if (bg.type === "solid") return "background-color:" + bg.value;
  if (bg.type === "texture") {
    var style = "background-image:" + bg.value + ";background-color:" + (bg.bgColor || "#fff");
    if (bg.bgSize) style += ";background-size:" + bg.bgSize;
    return style;
  }
  return "background-image:" + bg.value;
}

function isBgLight(bg) {
  var hex = (bg.type === "solid" ? bg.value : bg.bgColor || "").replace("#", "");
  if (!/^[0-9a-fA-F]{6}$/.test(hex)) return false;
  var r = parseInt(hex.substring(0, 2), 16);
  var g = parseInt(hex.substring(2, 4), 16);
  var b = parseInt(hex.substring(4, 6), 16);
  return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.55;
}

// DOM helper: create element with props and children
function h(tag, props, kids) {
  var element = document.createElement(tag);
  if (props) {
    for (var key in props) {
      if (key === "style" && typeof props[key] === "string") {
        element.style.cssText = props[key];
      } else if (key === "style" && typeof props[key] === "object") {
        for (var sk in props[key]) element.style[sk] = props[key][sk];
      } else if (key.indexOf("on") === 0) {
        element.addEventListener(key.slice(2).toLowerCase(), props[key]);
      } else if (key === "className") {
        element.className = props[key];
      } else if (key === "html") {
        element.innerHTML = props[key];
      } else {
        element.setAttribute(key, props[key]);
      }
    }
  }
  if (kids != null) {
    if (!Array.isArray(kids)) kids = [kids];
    for (var i = 0; i < kids.length; i++) {
      var child = kids[i];
      if (child != null) {
        if (typeof child === "string" || typeof child === "number") {
          element.appendChild(document.createTextNode(child));
        } else {
          element.appendChild(child);
        }
      }
    }
  }
  return element;
}

// ── CARD RENDERER ──

function renderCard(size, interactive) {
  var scaleMap = { small: 0.48, preview: 0.82, mobile: Math.min((window.innerWidth - 40) / 360, 0.85), reveal: 0.88, normal: 1 };
  var scale = scaleMap[size] || 1;
  var cardWidth = 360 * scale;
  var cardHeight = 480 * scale;
  var isTypographic = state.layout.id === "typographic";
  var layoutConfig = LAYOUT_MAP[state.layout.id] || LAYOUT_MAP["centered"];

  var card = h("div", { style: "width:" + cardWidth + "px;height:" + cardHeight + "px;border-radius:" + (20 * scale) + "px;overflow:hidden;position:relative;flex-shrink:0;box-shadow:0 8px 32px rgba(0,0,0,0.1), 0 1px 4px rgba(0,0,0,0.06);" + getBgStyle(state.background) });
  if (interactive) card.id = "cardZone";

  // Photo layers (show placeholder when photo layout selected but no photo uploaded)
  var isPhotoLayout = state.layout.id === "photo-full" || state.layout.id === "photo-circle" || state.layout.id === "photo-corner";
  var photoSrc = state.photoUrl;
  var showPlaceholder = isPhotoLayout && !photoSrc;

  if (state.layout.id === "photo-full") {
    var photoWrap = h("div", { style: "position:absolute;inset:0" });
    if (photoSrc) {
      photoWrap.appendChild(h("img", { src: photoSrc, style: "width:100%;height:60%;object-fit:cover" }));
    } else {
      photoWrap.appendChild(h("div", { style: "width:100%;height:60%;background:linear-gradient(135deg, rgba(0,0,0,0.08), rgba(0,0,0,0.03));display:flex;align-items:center;justify-content:center" }, [
        h("span", { style: "font-size:" + (28 * scale) + "px;opacity:0.3" }, "📷")
      ]));
    }
    photoWrap.appendChild(h("div", { style: "position:absolute;inset:0;background:linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.6) 100%)" }));
    card.appendChild(photoWrap);
  }
  if (state.layout.id === "photo-circle") {
    var circleSize = 110 * scale;
    var circleWrap = h("div", { style: "position:absolute;top:" + (28 * scale) + "px;left:50%;transform:translateX(-50%);width:" + circleSize + "px;height:" + circleSize + "px;border-radius:50%;overflow:hidden;border:3px solid rgba(255,255,255,0.5);box-shadow:0 6px 20px rgba(0,0,0,0.12)" });
    if (photoSrc) {
      circleWrap.appendChild(h("img", { src: photoSrc, style: "width:100%;height:100%;object-fit:cover" }));
    } else {
      circleWrap.appendChild(h("div", { style: "width:100%;height:100%;background:linear-gradient(135deg, rgba(0,0,0,0.08), rgba(0,0,0,0.03));display:flex;align-items:center;justify-content:center" }, [
        h("span", { style: "font-size:" + (22 * scale) + "px;opacity:0.3" }, "📷")
      ]));
    }
    card.appendChild(circleWrap);
  }
  if (state.layout.id === "photo-corner") {
    var cornerWrap = h("div", { style: "position:absolute;top:" + (16 * scale) + "px;right:" + (16 * scale) + "px;width:" + (100 * scale) + "px;height:" + (100 * scale) + "px;border-radius:" + (12 * scale) + "px;overflow:hidden;border:2px solid rgba(255,255,255,0.4)" });
    if (photoSrc) {
      cornerWrap.appendChild(h("img", { src: photoSrc, style: "width:100%;height:100%;object-fit:cover" }));
    } else {

// ── STICKER DRAG SYSTEM ──

var dragState = { active: false, id: null, offsetX: 0, offsetY: 0 };
var activeStickerDelete = null;

function startDrag(id, clientX, clientY) {
  var cardEl = document.getElementById("cardZone");
  if (!cardEl) return;
  var rect = cardEl.getBoundingClientRect();
  var sticker = state.stickers.find(function(s) { return s.id === id; });
  if (!sticker) return;
  dragState = {
    active: true,
    id: id,
    offsetX: clientX - rect.left - (sticker.x / 100) * rect.width,
    offsetY: clientY - rect.top - (sticker.y / 100) * rect.height
  };
}

function handleDragMove(clientX, clientY) {
  if (!dragState.active) return;
  var cardEl = document.getElementById("cardZone");
  if (!cardEl) return;
  var rect = cardEl.getBoundingClientRect();
  var newX = Math.max(0, Math.min(92, ((clientX - rect.left - dragState.offsetX) / rect.width) * 100));
  var newY = Math.max(0, Math.min(92, ((clientY - rect.top - dragState.offsetY) / rect.height) * 100));
  state.stickers = state.stickers.map(function(s) {
    if (s.id === dragState.id) { s.x = newX; s.y = newY; }
    return s;
  });
  render();
}

document.addEventListener("mousemove", function(e) { handleDragMove(e.clientX, e.clientY); });
document.addEventListener("mouseup", function() { dragState.active = false; });
document.addEventListener("touchmove", function(e) {
  if (dragState.active) { e.preventDefault(); handleDragMove(e.touches[0].clientX, e.touches[0].clientY); }
}, { passive: false });
document.addEventListener("touchend", function() { dragState.active = false; });

function toggleStickerDelete(id) {
  activeStickerDelete = activeStickerDelete === id ? null : id;
  render();
}

function removeSticker(id) {
  state.stickers = state.stickers.filter(function(s) { return s.id !== id; });
  activeStickerDelete = null;
  render();
}

function addSticker(emoji) {
  state.stickers.push({
    emoji: emoji,
    id: Date.now() + Math.random(),
    x: 15 + Math.random() * 50,
    y: 15 + Math.random() * 50,
    rotation: -20 + Math.random() * 40,
    scale: 0.9 + Math.random() * 0.4,
    size: 28
  });
  render();
}

// ── PILL BUTTON FACTORY ──

  var btn = h("button", {
    style: "border-radius:8px;padding:5px 13px;font-size:12px;white-space:nowrap;" +

      "color:" + (isActive ? "var(--accent)" : "var(--text3)"),

  }, label);
  return btn;
}

    // QR placeholder
    var qrPlaceholder = h("div", { style: "background:var(--input);border:1px dashed var(--border);border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:14px;opacity:0.4" });
    qrPlaceholder.appendChild(h("span", { style: "font-size:14px;color:var(--text3)" }, "▣"));
    qrPlaceholder.appendChild(h("p", { style: "color:var(--text3);font-size:11px;margin:0" }, "QR Code coming soon"));
    optionsWrap.appendChild(qrPlaceholder);

    screen.appendChild(optionsWrap);
    screen.appendChild(h("button", { style: "background:none;border:none;color:var(--text3);font-size:13px;margin-top:24px;cursor:pointer", onClick: function() { setState({ screen: "preview" }); } }, "← Back to Preview"));
    app.appendChild(screen);
    return;
  }
}


// ── INIT ──
window.addEventListener("resize", function() { render(); });
render();

</script>
</body>
</html>
